spring:
  config:
    activate:
      on-profile: prod

rabbitmq:
  host: ${RABBITMQ_STOMP_HOST}
  port: ${RABBITMQ_STOMP_PORT}
  username: ${RABBITMQ_STOMP_USERNAME}
  password: ${RABBITMQ_STOMP_PASSWORD}
  enabled: ${RABBITMQ_ENABLED}

---
spring:
  config:
    activate:
      on-profile: dev

rabbitmq:
  host: ${RABBITMQ_STOMP_HOST}
  port: ${RABBITMQ_STOMP_PORT}
  username: ${RABBITMQ_STOMP_USERNAME}
  password: ${RABBITMQ_STOMP_PASSWORD}
  enabled: ${RABBITMQ_ENABLED}

---
spring:
  config:
    activate:
      on-profile: local

rabbitmq:
  host: ${RABBITMQ_STOMP_HOST}
  port: ${RABBITMQ_STOMP_PORT}
  username: ${RABBITMQ_STOMP_USERNAME}
  password: ${RABBITMQ_STOMP_PASSWORD}
  enabled: ${RABBITMQ_ENABLED}
