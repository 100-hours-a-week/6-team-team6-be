spring:
  flyway:
    enabled: false

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 10MB      # 파일 1개 최대 크기
      max-request-size: 30MB   # multipart/form-data 요청 전체(여러 파일 + 폼필드 포함) 최대 크기

jwt:
  secret-key: secretsecretsecretsecretsecretsecretsecretsecretsecretsecret
  access-duration: 180000
  refresh-duration: 3600000

cors:
  allowed:
    origin: "*"

ai:
  base-url: localhost:9999
  timeout-seconds: 5

app:
  cookie:
    secure: false
