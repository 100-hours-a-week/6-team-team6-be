name: CD - Split Deploy (Dev/Prod)

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: "CI workflow run ID (build-artifact source)"
        required: false
        type: string
      run_flyway:
        description: "Enable Flyway migration during PROD deploy"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read


env:
  APP_NAME: billage
  JAVA_VERSION: '25'

jobs:
  # =================================================================================
  # 개발 환경 배포
  # - 브랜치가 'dev'일 때만 실행
  # =================================================================================

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'dev' &&
        github.event.workflow_run.event == 'push'
      }}

    steps:
      - name: Configure AWS Credentials (DEV)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} # 필요하다면 DEV용 키 별도 사용 가능
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # IP 가져오기 (DEV 태그 검색)
      - name: Get Dev Server IP
        id: get-ip
        run: |
          # Dev는 태그가 명확하게 고정됨
          TARGET_TAG="${{ env.APP_NAME }}-dev-main-server"

          IP=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=$TARGET_TAG" \
              "Name=tag:Environment,Values=dev" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          if [ "$IP" == "None" ] || [ -z "$IP" ]; then
            echo "::error::DEV Server not found!"
            exit 1
          fi
          echo "server_ip=$IP" >> $GITHUB_OUTPUT


      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: build-artifact
          path: artifacts/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ steps.get-ip.outputs.server_ip }} >> ~/.ssh/known_hosts

      - name: Deploy to Dev Server
        run: |
          # JAR 파일과 배포 스크립트를 임시 디렉토리로 전송
          # 배포 스크립트가 /opt/billage/backend/로 이동 처리
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              artifacts/app.jar \
              scripts/deploy_dev.sh \
              ${{ secrets.EC2_USER }}@${{ steps.get-ip.outputs.server_ip }}:/home/${{ secrets.EC2_USER }}/deploy/

          # 배포 스크립트 실행
          # - 디렉토리 구조: /opt/billage/backend/ (애플리케이션)
          # - 로그 디렉토리: /var/log/billage/backend/ (로그 파일)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ steps.get-ip.outputs.server_ip }} << 'EOF'
            cd /home/${{ secrets.EC2_USER }}/deploy
            chmod +x deploy_dev.sh
            ./deploy_dev.sh
          EOF


      - name: Health Check
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ steps.get-ip.outputs.server_ip }} << 'EOF'

            MAX_RETRIES=12
            RETRY_INTERVAL=3

            for i in $(seq 1 $MAX_RETRIES); do
              echo "Health check attempt $i/$MAX_RETRIES..."

              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "Health check passed!"
                exit 0
              fi

              sleep $RETRY_INTERVAL
            done

            echo "Health check failed!"
            exit 1
          EOF
          

      - name: Notify Dev Deploy success
        if: success()
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{"content": "**DEV 배포 완료**: ${{ github.event.workflow_run.head_sha }}"}' ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify Dev Deploy failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{"content": "**DEV 배포 실패**: ${{ github.event.workflow_run.head_sha }}"}' ${{ secrets.DISCORD_WEBHOOK }}


  # =================================================================================
  # 운영 환경 배포
  # - 브랜치가 'main'일 때만 실행
  # =================================================================================

  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    env:
      FLYWAY_ENABLED: ${{ github.event_name == 'workflow_dispatch' && inputs.run_flyway || 'false' }}
    if: >-
      ${{
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.event == 'push'
        ) || (
          github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/main'
        )
      }}

    steps:
      - name: Resolve CI Run ID
        id: resolve-ci-run
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            if (eventName === 'workflow_run') {
              const runId = String(context.payload.workflow_run.id);
              core.info(`Using workflow_run id: ${runId}`);
              core.setOutput('run_id', runId);
              return;
            }

            const manualRunId = process.env.CI_RUN_ID || '';
            if (manualRunId && manualRunId.trim() !== '') {
              core.info(`Using manual ci_run_id: ${manualRunId.trim()}`);
              core.setOutput('run_id', manualRunId.trim());
              return;
            }

            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              status: 'completed',
              per_page: 20
            });

            const successRun = data.workflow_runs.find((run) => run.conclusion === 'success');
            if (!successRun) {
              core.setFailed('No successful main CI run found for ci.yml');
              return;
            }

            core.info(`Auto-selected latest successful main CI run id: ${successRun.id}`);
            core.setOutput('run_id', String(successRun.id));
        env:
          CI_RUN_ID: ${{ inputs.ci_run_id }}

      - name: Configure AWS Credentials (PROD)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get Prod Server IP
        id: get-ip
        run: |
          TARGET_TAG="${{ env.APP_NAME }}-prod-main-server"
          
          IP=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=$TARGET_TAG" \
              "Name=tag:Environment,Values=prod" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          
          if [ "$IP" == "None" ] || [ -z "$IP" ]; then
            echo "::error::PROD Server not found!"
            exit 1
          fi
          echo "server_ip=$IP" >> $GITHUB_OUTPUT

      - name: Download Artifacts
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: ci.yml
          run_id: ${{ steps.resolve-ci-run.outputs.run_id }}
          name: build-artifact
          path: artifacts/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ steps.get-ip.outputs.server_ip }} >> ~/.ssh/known_hosts

      - name: Upload JAR to Deploy Directory
        run: |
          # 정규화된 app.jar를 backend 배포 디렉토리로 업로드
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              artifacts/app.jar \
              ${{ secrets.EC2_USER }}@${{ steps.get-ip.outputs.server_ip }}:/home/${{ secrets.EC2_USER }}/deploy/backend/app.jar

      - name: Deploy Backend (Blue-Green)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ steps.get-ip.outputs.server_ip }} \
              'SPRING_PROFILES_ACTIVE=prod SPRING_FLYWAY_ENABLED=${{ env.FLYWAY_ENABLED }} bash /home/${{ secrets.EC2_USER }}/scripts/deploy.sh backend'

      - name: Health Check
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ steps.get-ip.outputs.server_ip }} \
              'bash /home/${{ secrets.EC2_USER }}/scripts/health_check.sh backend'

      - name: Notify Prod Deploy success
        if: success()
        run: |
          curl -H "Content-Type: application/json" -X POST -d '{"content": "**PROD 배포 성공**: ${{ github.sha }}"}' ${{ secrets.DISCORD_WEBHOOK }}

      - name: Rollback on Failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ steps.get-ip.outputs.server_ip }} \
              'bash /home/${{ secrets.EC2_USER }}/scripts/rollback.sh backend'
          curl -H "Content-Type: application/json" -X POST \
              -d '{"content": "**PROD 배포 실패 및 롤백됨**: ${{ github.event.workflow_run.head_sha || github.sha }}"}' \
              ${{ secrets.DISCORD_WEBHOOK }}
